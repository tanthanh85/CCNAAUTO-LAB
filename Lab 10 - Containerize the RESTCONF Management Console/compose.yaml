services:
  console:
    build:
      context: ../devnet-associate-lab09
      dockerfile: ../devnet-associate-lab10/Dockerfile
    image: devnet/restconf-console:lab10
    container_name: lab10-restconf-console
    # Share the Ubuntu host network namespace so RESTCONF traffic follows
    # the routes installed by the Cisco sandbox VPN client.
    network_mode: host
    env_file:
      - .env
    volumes:
      - inventory_data:/app/instance
      - ./certificates:/certificates:ro
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  inventory_data:
