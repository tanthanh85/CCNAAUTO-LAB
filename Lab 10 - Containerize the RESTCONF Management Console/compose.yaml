services:
  console:
    build:
      context: ../Lab 09 - RESTCONF Management Console
      dockerfile: ../Lab 10 - Containerize the RESTCONF Management Console/Dockerfile
    image: devnet/restconf-console:lab10
    container_name: lab10-restconf-console
    env_file:
      - .env
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - inventory_data:/app/instance
      - ./certificates:/certificates:ro
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  inventory_data:
